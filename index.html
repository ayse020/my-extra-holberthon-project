
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Hello Kitty Konfet Ovunda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div id="start-screen" class="overlay">
            <h1>Hello Kitty Konfet Ovunda</h1>
            <div class="rules">
                <p>🎀 Qaydalar:</p>
                <ul>
                    <li>Sağ-sol oxları ilə Hello Kittyni hərəkət etdir.</li>
                    <li>Göydən düşən konfetləri tut və xal qazan! 🍬</li>
                    <li>Ürək tut — can qazan! 💖</li>
                    <li>Bombalardan qaç! 3 can bitəndə oyun bitər. 💣</li>
                </ul>
            </div>
            <button id="start-btn">Oyuna Başla</button>
        </div>

        <div id="score">Xal: 0</div>
        <div id="player"></div>

        <button id="music-btn">🎵</button>

        <div id="game-over-screen" class="overlay" style="display:none;">
            <h1>OYUN BİTDİ! 😿</h1>
            <p id="final-score">Xalın: 0</p>
            <button onclick="location.reload()">Yenidən Başla</button>
        </div>
    </div>

    <audio id="sound-start" src="start.mp3" loop></audio>
    <audio id="sound-catch" src="candy.mp3"></audio>
    <audio id="sound-bomb-fuse" src="fuse.mp3" loop></audio>
    <audio id="sound-explosion" src="explosion.mp3"></audio>
    <audio id="sound-heart" src="candy.mp3"></audio>
    <audio id="sound-click" src="click.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
